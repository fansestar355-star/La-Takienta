<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expérience Koutammakou - Togo</title>
    <!-- GSAP for animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400&display=swap">
    <style>
        body {
            margin: 0;
            background: #050505;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        #ui-top {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            width: 100%;
            z-index: 10;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }

        #ui-bottom {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #ui-top.fade,
        #ui-bottom.fade {
            opacity: 0;
            pointer-events: none;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5em;
            margin: 0;
            color: #f9d58b;
            white-space: nowrap;
            text-shadow: 0 0 20px rgba(249, 213, 139, 0.3);
        }

        button {
            padding: 16px 40px;
            background: rgba(85, 65, 93, 0.8);
            border: 2px solid #f9d58b;
            color: #f9d58b;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 0.8rem;
            transition: all 0.3s ease;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            backdrop-filter: blur(10px);
        }

        button:hover {
            background: #f9d58b;
            color: #55415d;
            letter-spacing: 6px;
            transform: scale(1.05);
        }

        #landscape-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            display: none;
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        #portal-vortex {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background:
                radial-gradient(ellipse 80% 60% at 50% 35%, rgba(85, 65, 93, 0.55) 0%, transparent 70%),
                radial-gradient(ellipse at center, #0d0810 0%, #050505 100%);
            z-index: 100;
            pointer-events: none;
            opacity: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }

        #portal-vortex.active {
            opacity: 1;
            pointer-events: all;
        }

        .portal-dna {
            width: 60px;
            height: 112px;
            position: relative;
            margin-bottom: 40px;
        }

        .portal-dna-dot {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #f9d58b;
            border-radius: 50%;
            left: 26px;
            animation: portalDna 2s ease-in-out infinite;
            box-shadow: 0 0 10px rgba(249, 213, 139, 0.55);
        }

        @keyframes portalDna {
            0%, 100% { transform: translateX(-22px) scale(0.55); opacity: 0.25; background: #55415d; box-shadow: 0 0 6px rgba(85,65,93,0.6); }
            50%       { transform: translateX(22px)  scale(1);    opacity: 1;    background: #f9d58b; box-shadow: 0 0 12px rgba(249,213,139,0.6); }
        }

        .portal-divider {
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(85, 65, 93, 0.8), rgba(249, 213, 139, 0.5), rgba(85, 65, 93, 0.8), transparent);
            margin-bottom: 28px;
        }

        .portal-boot-text {
            font-family: 'IBM Plex Mono', 'Courier New', monospace;
            font-size: 13px;
            color: rgba(249, 213, 139, 0.75);
            letter-spacing: 2px;
            text-align: center;
            line-height: 1.9;
        }

        .portal-boot-text .portal-finale {
            color: #f9d58b;
            text-shadow: 0 0 18px rgba(249, 213, 139, 0.4);
            opacity: 1;
        }

        canvas {
            transition: filter 1.5s ease, opacity 1.5s ease;
        }

        .blur-effect {
            filter: blur(10px);
        }

        /* --- Esthétique Annotation Premium (Style Callout UI) --- */
        .annotation-wrapper {
            pointer-events: none;
            /* Laisse passer les clics */
        }

        .annotation-container {
            pointer-events: auto;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            color: #f9d58b;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .annotation-title {
            font-size: 18px;
            font-weight: 400;
            padding: 0 4px 4px 4px;
            letter-spacing: 1px;
            text-shadow: 0 0 6px #f9d58b(0, 0, 0, 1);
        }

        .annotation-divider {
            height: 1.5px;
            background: #ffffff;
            width: 100%;
            box-shadow: 0 0 4px rgba(0, 0, 0, 0.8);
            transition: all 0.3s ease;
        }

        .annotation-subtitle {
            font-size: 11px;
            font-weight: 300;
            padding: 4px 4px 0 4px;
            letter-spacing: 0.5px;
            color: #dddddd;
            text-shadow: 0 0 4px rgba(0, 0, 0, 0.8);
        }

        .annotation-container:hover .annotation-divider {
            background: #f9d58b;
        }

        .annotation-container:hover .annotation-title,
        .annotation-container:hover .annotation-subtitle {
            color: #f9d58b;
        }

        @keyframes annotationRipple {
            0%   { box-shadow: 0 0 0 0   rgba(249,213,139,0.7), 0 0 0 0   rgba(249,213,139,0.35); }
            65%  { box-shadow: 0 0 0 10px rgba(249,213,139,0),  0 0 0 20px rgba(249,213,139,0);   }
            100% { box-shadow: 0 0 0 0   rgba(249,213,139,0),  0 0 0 0   rgba(249,213,139,0);   }
        }

        @keyframes annotationFloat {
            0%, 100% { transform: translateY(0px);  }
            50%      { transform: translateY(-6px); }
        }

        @keyframes annotationShimmer {
            0%, 100% { color: #ffffff; text-shadow: none; }
            50%      { color: #f9d58b; text-shadow: 0 0 14px rgba(249,213,139,0.65); }
        }

        .annotation-point {
            width: 14px;
            height: 14px;
            background: transparent;
            border-radius: 50%;
            border: 1.5px solid #f9d58b;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: annotationRipple 2.6s ease-out infinite;
        }

        .annotation-point::after {
            content: '';
            width: 5px;
            height: 5px;
            background: #f9d58b;
            border-radius: 50%;
        }

        .annotation-wrapper {
            animation: annotationFloat 3.2s ease-in-out infinite;
        }

        .annotation-title {
            animation: annotationShimmer 3.2s ease-in-out infinite;
        }

        .annotation-container:hover .annotation-title {
            animation-play-state: paused;
            color: #f9d58b;
            text-shadow: 0 0 14px rgba(249,213,139,0.65);
        }

        /* Panneau d'information */
        #info-card {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 300px;
            background: rgba(5, 5, 5, 0.85);
            background-color: #55415d;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 2px solid #ffffff;
            padding: 24px;
            color: #fff;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px);
            transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            backdrop-filter: blur(20px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        #info-card.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        #info-card h3 {
            color: #f9d58b;
            margin: 0 0 12px 0;
            font-size: 1.2rem;
            font-weight: 400;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            padding-bottom: 8px;
        }

        #info-card p {
            font-size: 0.85rem;
            line-height: 1.6;
            color: #cccccc;
            font-weight: 300;
        }

        .close-info {
            display: inline-block;
            margin-top: 20px;
            color: #ffffff;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.7;
            transition: opacity 0.3s ease;
        }

        .close-info:hover {
            opacity: 1;
        }
    </style>
</head>

<body>

    <div id="portal-vortex">
        <div class="portal-dna" id="portal-dna"></div>
        <div class="portal-divider"></div>
        <div class="portal-boot-text" id="portal-boot-text"></div>
    </div>
    <div id="ui-top">
        <h1 id="title">Afrique de l'Ouest</h1>
    </div>

    <div id="ui-bottom">
        <button id="next-btn">Explorer le Togo</button>
    </div>

    <div id="landscape-container"></div>

    <div id="info-card">
        <h3 id="info-title">Objet</h3>
        <p id="info-text">Description...</p>
        <div class="close-info" onclick="closeInfo()">✕ FERMER</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
        import { SimplexNoise } from 'three/addons/math/SimplexNoise.js';
        import { Sky } from 'three/addons/objects/Sky.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- Globals ---
        let scene, camera, renderer, globe, earthGroup, atmosphere, marker, controls;
        let landscapeScene, landscapeCamera, landscapeRenderer, landscapeControls, labelRenderer, skyObj, sunVec;
        let mainModel = null; // Stockage du modèle pour les annotations
        let annotations = []; // Liste des labels actifs

        const PART_DESCRIPTIONS = {
            "LADDER_2": { title: "Échelle Sacrée", desc: "Permet l'accès aux niveaux supérieurs. Elle symbolise le lien entre la terre et le ciel." },
            "ALTARS": { title: "Autels Koutammakou", desc: "Espace spirituel dédié aux ancêtres, situé à l'entrée de la maison batammariba." },
            "ATTIC_1": { title: "Grenier Principal", desc: "Utilisé pour stocker les récoltes de mil et de sorgho, protégé par un toit en chaume." },
            "ATTIC_2": { title: "Grenier Secondaire", desc: "Stockage supplémentaire ventilé naturellement pour conserver les denrées." },
            "FORTRESSES": { title: "Murs Défensifs", desc: "Faits de terre crue massive pour protéger les habitants contre les ennemis et les éléments." },
            "THATCHED COVER_1": { title: "Toit en Chaume", desc: "Structure conique amovible permettant une aération optimale pendant la saison sèche." }
        };

        let isTransitioning = false;
        let step = 0;
        let landscapeInitialized = false;
        const simplex = new SimplexNoise();

        const CONFIG = {
            worldSize: 2500,
            takientaCount: 12
        };

        const locations = [
            { name: "Afrique de l'Ouest", lat: 12, lon: -2, distance: 350 },
            { name: "Le Togo", lat: 10.1, lon: 0.82, distance: 150 },
            { name: "La Takienta", lat: 10.1, lon: 0.82, distance: 10 }
        ];

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.0;
            document.body.appendChild(renderer.domElement);

            earthGroup = new THREE.Group();
            scene.add(earthGroup);

            const texLoader = new THREE.TextureLoader();
            const earthTexture = texLoader.load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg');
            const earthNormal = texLoader.load('https://threejs.org/examples/textures/planets/earth_normal_2048.jpg');

            const globeGeo = new THREE.SphereGeometry(100, 64, 64);
            const globeMat = new THREE.MeshPhongMaterial({
                map: earthTexture,
                normalMap: earthNormal,
                normalScale: new THREE.Vector2(0.5, 0.5),
                shininess: 10,
                color: 0xcccccc
            });
            globe = new THREE.Mesh(globeGeo, globeMat);
            earthGroup.add(globe);

            // Halo doré (côté jour) — couleur #f9d58b de l'expérience
            const atmosGeo = new THREE.SphereGeometry(106, 64, 64);
            const atmosMat = new THREE.ShaderMaterial({
                vertexShader: `
                    varying vec3 vNormal;
                    void main() {
                        vNormal = normalize(normalMatrix * normal);
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    varying vec3 vNormal;
                    void main() {
                        float intensity = pow(0.68 - dot(vNormal, vec3(0, 0, 1.0)), 5.0);
                        intensity = clamp(intensity, 0.0, 1.0);
                        gl_FragColor = vec4(0.976, 0.835, 0.545, 1.0) * intensity;
                    }
                `,
                side: THREE.BackSide,
                blending: THREE.AdditiveBlending,
                transparent: true
            });
            atmosphere = new THREE.Mesh(atmosGeo, atmosMat);
            earthGroup.add(atmosphere);

            // Voile violet sur le côté nuit — couleur #55415d de l'expérience
            const nightGeo = new THREE.SphereGeometry(101.5, 64, 64);
            const nightMat = new THREE.ShaderMaterial({
                vertexShader: `
                    varying vec3 vNormal;
                    void main() {
                        vNormal = normalize(normalMatrix * normal);
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    varying vec3 vNormal;
                    void main() {
                        float d = dot(vNormal, vec3(0, 0, 1.0));
                        float intensity = smoothstep(0.1, -0.4, d) * 0.55;
                        gl_FragColor = vec4(0.333, 0.255, 0.365, intensity);
                    }
                `,
                side: THREE.FrontSide,
                blending: THREE.NormalBlending,
                transparent: true,
                depthWrite: false
            });
            earthGroup.add(new THREE.Mesh(nightGeo, nightMat));

            const sunLight = new THREE.DirectionalLight(0xfff4e0, 1.5);
            sunLight.position.set(350, 200, 100);
            scene.add(sunLight);

            const fillLight = new THREE.DirectionalLight(0x55415d, 0.18);
            fillLight.position.set(-350, -100, -100);
            scene.add(fillLight);

            const ambientLight = new THREE.AmbientLight(0xfff8f0, 0.15);
            scene.add(ambientLight);

            createStars();

            marker = createMarker(10.1, 0.82);
            loadCountryBorders();

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = false;

            const startPos = latLonToVector3(locations[0].lat, locations[0].lon, locations[0].distance);
            camera.position.copy(startPos);
            camera.lookAt(0, 0, 0);

            window.addEventListener('resize', onWindowResize);
            document.getElementById('next-btn').addEventListener('click', nextStep);

            animate();
        }

        function createStars() {
            const geo = new THREE.BufferGeometry();
            const positions = [];
            const sizes = [];
            for (let i = 0; i < 4500; i++) {
                const r = 900 + Math.random() * 600;
                const u = Math.random(), v = Math.random();
                const theta = 2 * Math.PI * u;
                const phi = Math.acos(2 * v - 1);
                positions.push(
                    r * Math.sin(phi) * Math.cos(theta),
                    r * Math.sin(phi) * Math.sin(theta),
                    r * Math.cos(phi)
                );
                sizes.push(Math.random() < 0.05 ? 2.5 : 1.0);
            }
            geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geo.setAttribute('size', new THREE.Float32BufferAttribute(sizes, 1));
            const mat = new THREE.PointsMaterial({
                color: 0xfff4e0,
                size: 1.2,
                transparent: true,
                opacity: 0.75,
                sizeAttenuation: true
            });
            scene.add(new THREE.Points(geo, mat));
        }

        function createMarker(lat, lon) {
            const group = new THREE.Group();
            const pos = latLonToVector3(lat, lon, 101);
            const mat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const bar1 = new THREE.Mesh(new THREE.BoxGeometry(2, 0.3, 0.3), mat);
            const bar2 = new THREE.Mesh(new THREE.BoxGeometry(2, 0.3, 0.3), mat);
            bar1.rotation.z = Math.PI / 4;
            bar2.rotation.z = -Math.PI / 4;
            group.add(bar1, bar2);
            group.position.copy(pos);
            group.lookAt(0, 0, 0);
            earthGroup.add(group);
            return group;
        }

        async function loadCountryBorders() {
            try {
                const res = await fetch('https://raw.githubusercontent.com/johan/world.geo.json/master/countries.geo.json');
                const data = await res.json();
                // Frontières générales : or visible, pays reconnaissables
                const borderMat = new THREE.LineBasicMaterial({ color: 0xf9d58b, transparent: true, opacity: 0.52 });
                // Togo : or vif saturé, clairement lisible
                const togoMat  = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: false, opacity: 1.0 });
                data.features.forEach(feature => {
                    const isTogo = feature.properties.name === "Togo";
                    const coords = feature.geometry.coordinates;
                    const type   = feature.geometry.type;
                    const drawAll = (ring) => {
                        if (isTogo) {
                            drawRing(ring, togoMat, 100.5);
                        } else {
                            drawRing(ring, borderMat, 100.5);
                        }
                    };
                    if (type === 'Polygon') {
                        coords.forEach(drawAll);
                    } else if (type === 'MultiPolygon') {
                        coords.forEach(poly => poly.forEach(drawAll));
                    }
                });
            } catch (e) { console.error(e); }
        }

        function drawRing(ring, mat, radius = 100.5) {
            const pts = ring.map(c => latLonToVector3(c[1], c[0], radius));
            const geo = new THREE.BufferGeometry().setFromPoints(pts);
            const line = new THREE.Line(geo, mat);
            earthGroup.add(line);
        }

        function latLonToVector3(lat, lon, radius) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lon + 180) * (Math.PI / 180);
            return new THREE.Vector3(
                -radius * Math.sin(phi) * Math.cos(theta),
                radius * Math.cos(phi),
                radius * Math.sin(phi) * Math.sin(theta)
            );
        }

        function portalTypeText(el, text) {
            return new Promise(resolve => {
                if (!text) { resolve(); return; }
                let i = 0;
                const span = document.createElement('span');
                el.appendChild(span);
                const iv = setInterval(() => {
                    span.textContent += text[i++];
                    if (i >= text.length) { clearInterval(iv); resolve(); }
                }, 22);
            });
        }

        async function nextStep() {
            if (isTransitioning) return;
            isTransitioning = true;

            const uiTop = document.getElementById('ui-top');
            const uiBottom = document.getElementById('ui-bottom');
            uiTop.classList.add('fade');
            uiBottom.classList.add('fade');

            setTimeout(() => {
                step = (step + 1) % locations.length;
                const target = locations[step];
                document.getElementById('title').innerText = target.name;

                const worldPos = latLonToVector3(target.lat, target.lon, target.distance);
                const lookAtPos = new THREE.Vector3(0, 0, 0);

                function easeInOut(t) {
                    return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t + 2, 3) / 2;
                }

                function runAnim(fromPos, toPos, fromLook, toLook, duration, onDone) {
                    const t0 = performance.now();
                    function tick() {
                        const t = Math.min((performance.now() - t0) / duration, 1);
                        const e = easeInOut(t);
                        camera.position.lerpVectors(fromPos, toPos, e);
                        camera.lookAt(new THREE.Vector3().lerpVectors(fromLook, toLook, e));
                        if (t < 1) requestAnimationFrame(tick);
                        else onDone();
                    }
                    tick();
                }

                function onTransitionComplete() {
                    const vortex = document.getElementById('portal-vortex');
                    const landscapeContainer = document.getElementById('landscape-container');
                    const canvas = renderer.domElement;
                    if (step === 2) {
                        // Paysage visible — dissoudre l'écran de boot
                        vortex.style.transition = 'opacity 1.5s ease-out';
                        vortex.style.opacity = '0';
                        vortex.style.pointerEvents = 'none';
                    } else {
                        // Retour au globe — remet l'atmosphère visible
                        if (atmosphere) atmosphere.visible = true;
                        controls.enabled = true;
                        landscapeContainer.style.display = 'none';
                        landscapeContainer.style.opacity = '0';
                        canvas.style.transition = 'opacity 1s ease-out';
                        canvas.style.opacity = '1';
                        canvas.classList.remove('blur-effect');
                    }
                    isTransitioning = false;
                    uiTop.classList.remove('fade');
                    uiBottom.classList.remove('fade');
                    const btn = document.querySelector('#ui-bottom button');
                    btn.innerText = (step === 2) ? "Retour à l'espace" : (step === 1) ? "Voir la Takienta" : "Explorer le Togo";
                }

                if (step === 2) {
                    // Désactive OrbitControls pour éviter qu'il combatte le lerp manuel
                    controls.enabled = false;

                    // Récupère la position monde de la croix Togo
                    marker.getWorldPosition(lookAtPos);

                    // Phase 1 : zoom serré sur le Togo (distance ~120, hors du globe)
                    const closePos  = latLonToVector3(10.1, 0.82, 120);
                    const cam0      = camera.position.clone();
                    const look0     = controls.target.clone();

                    runAnim(cam0, closePos, look0, lookAtPos, 2200, () => {


                        // Courte pause — l'utilisateur voit le Togo en gros plan
                        setTimeout(() => {

                            // Cache l'atmosphère avant le zoom serré pour éviter le rendu de l'intérieur
                            if (atmosphere) atmosphere.visible = false;
                            initLandscape();

                            // Phase 2 : snap instantané à la surface
                            const finalPos = latLonToVector3(10.1, 0.82, 104);
                            camera.position.copy(finalPos);
                            camera.lookAt(lookAtPos);

                            (async () => {
                                const vortex = document.getElementById('portal-vortex');
                                const canvas  = renderer.domElement;

                                // Build DNA helix
                                const dnaEl = document.getElementById('portal-dna');
                                dnaEl.innerHTML = '';
                                for (let i = 0; i < 8; i++) {
                                    const dot = document.createElement('div');
                                    dot.className = 'portal-dna-dot';
                                    dot.style.top = (i * 14) + 'px';
                                    dot.style.animationDelay = (i * 0.22) + 's';
                                    dnaEl.appendChild(dot);
                                }

                                // Fade in overlay + fade out globe
                                vortex.classList.add('active');
                                canvas.style.transition = 'opacity 0.5s ease';
                                canvas.style.opacity = '0';
                                await new Promise(r => setTimeout(r, 600));

                                // Typewriter boot sequence
                                const bootEl = document.getElementById('portal-boot-text');
                                bootEl.innerHTML = '';
                                const lines = [
                                    { text: '[ CONNEXION AU PORTAIL... ]',         finale: false },
                                    { text: '[ MÉMOIRE BATAMMARIBA ACTIVE ]',       finale: false },
                                    { text: '[ CHARGEMENT : KOUTAMMAKOU ]',         finale: false },
                                    { text: '[ CONSCIENCE ANCESTRALE ÉVEILLÉE ]',   finale: false },
                                    { text: '',                                      finale: false },
                                    { text: 'Bienvenue.',                            finale: true  }
                                ];
                                for (const { text, finale } of lines) {
                                    if (finale) {
                                        const span = document.createElement('span');
                                        span.className = 'portal-finale';
                                        bootEl.appendChild(span);
                                        await new Promise(resolve => {
                                            let i = 0;
                                            const iv = setInterval(() => {
                                                span.textContent += text[i++];
                                                if (i >= text.length) { clearInterval(iv); resolve(); }
                                            }, 22);
                                        });
                                    } else {
                                        await portalTypeText(bootEl, text);
                                    }
                                    bootEl.appendChild(document.createElement('br'));
                                    await new Promise(r => setTimeout(r, 220));
                                }

                                // Reveal landscape through fading overlay
                                const lc = document.getElementById('landscape-container');
                                lc.style.display = 'block';
                                await new Promise(r => setTimeout(r, 300));
                                lc.style.opacity = '1';
                                await new Promise(r => setTimeout(r, 900));
                                onTransitionComplete();
                            })();

                        }, 700);
                    });

                } else {
                    // Navigation normale (étapes 0 → 1 et retour)
                    const cam0  = camera.position.clone();
                    const look0 = new THREE.Vector3().copy(controls ? controls.target : new THREE.Vector3());
                    runAnim(cam0, worldPos, look0, lookAtPos, 2500, onTransitionComplete);
                }

            }, 800);
        }

        function initLandscape() {
            if (landscapeInitialized) return;
            landscapeInitialized = true;
            landscapeScene = new THREE.Scene();
            landscapeCamera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 10000);
            landscapeCamera.position.set(100, 80, 150);
            landscapeCamera.lookAt(0, 0, 0);

            landscapeRenderer = new THREE.WebGLRenderer({ antialias: true });
            landscapeRenderer.setSize(window.innerWidth, window.innerHeight);
            landscapeRenderer.shadowMap.enabled = true;
            landscapeRenderer.shadowMap.type = THREE.PCFSoftShadowMap;
            landscapeRenderer.toneMapping = THREE.ACESFilmicToneMapping;
            landscapeRenderer.toneMappingExposure = 0.8;
            document.getElementById('landscape-container').appendChild(landscapeRenderer.domElement);

            // Initialisation du Label Renderer pour les annotations HTML
            labelRenderer = new CSS2DRenderer();
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.domElement.style.position = 'absolute';
            labelRenderer.domElement.style.top = '0px';
            labelRenderer.domElement.style.pointerEvents = 'none'; // Très important
            document.getElementById('landscape-container').appendChild(labelRenderer.domElement);

            landscapeControls = new OrbitControls(landscapeCamera, landscapeRenderer.domElement);
            landscapeControls.enableDamping = true;
            landscapeControls.maxPolarAngle = Math.PI / 2.05;
            landscapeControls.autoRotate = true;
            landscapeControls.autoRotateSpeed = 0.2;
            landscapeControls.minDistance = 50;
            landscapeControls.maxDistance = 350;

            const ambient = new THREE.AmbientLight(0xffffff, 1.2);
            landscapeScene.add(ambient);

            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1.0);
            hemiLight.position.set(0, 200, 0);
            landscapeScene.add(hemiLight);

            sunVec = new THREE.Vector3();
            const sunLight = new THREE.DirectionalLight(0xfff4e0, 2.5);
            sunLight.castShadow = true;
            sunLight.shadow.mapSize.set(4096, 4096);
            sunLight.shadow.camera.left = -1500;
            sunLight.shadow.camera.right = 1500;
            sunLight.shadow.camera.top = 1500;
            sunLight.shadow.camera.bottom = -1500;
            landscapeScene.add(sunLight);

            skyObj = new Sky();
            skyObj.scale.setScalar(450000);
            landscapeScene.add(skyObj);

            const skyUniforms = skyObj.material.uniforms;
            skyUniforms['turbidity'].value = 10;
            skyUniforms['rayleigh'].value = 3;
            skyUniforms['mieCoefficient'].value = 0.005;
            skyUniforms['mieDirectionalG'].value = 0.8;

            const sunPhi = THREE.MathUtils.degToRad(86);
            const sunTheta = THREE.MathUtils.degToRad(180);
            sunVec.setFromSphericalCoords(1, sunPhi, sunTheta);
            skyUniforms['sunPosition'].value.copy(sunVec);
            sunLight.position.copy(sunVec).multiplyScalar(1000);

            landscapeScene.fog = new THREE.Fog(0xd8d0c8, 150, 1800);

            createTerrain();
            createVegetation();
            createTakientaHouses();
            loadMainModel();
        }

        function createTerrain() {
            const geo = new THREE.PlaneGeometry(2500, 2500, 128, 128);
            geo.rotateX(-Math.PI / 2);
            const pos = geo.attributes.position.array;
            const colors = [];

            const colorEarth = new THREE.Color(0x9d7b5f);
            const colorGrass = new THREE.Color(0x5c7a42);

            for (let i = 0; i < pos.length; i += 3) {
                const x = pos[i], z = pos[i + 2];
                pos[i + 1] = simplex.noise(x / 400, z / 400) * 4 + simplex.noise(x / 80, z / 80) * 1.5;

                const patchNoise = simplex.noise(x / 300, z / 300) + simplex.noise(x / 100, z / 100) * 0.5;
                let mixRatio = patchNoise > 0.2 ? 0.85 : 0.0;
                if (Math.sqrt(x * x + z * z) < 200) mixRatio = 0.0;
                const mixedColor = new THREE.Color().lerpColors(colorEarth, colorGrass, mixRatio);
                colors.push(mixedColor.r, mixedColor.g, mixedColor.b);
            }
            geo.computeVertexNormals();
            geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

            const mat = new THREE.MeshStandardMaterial({ vertexColors: true, roughness: 0.9, metalness: 0.05 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.receiveShadow = true;
            landscapeScene.add(mesh);
        }

        function createVegetation() {
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x483225 });
            const leafMat = new THREE.MeshStandardMaterial({ color: 0x1e361f });
            for (let i = 0; i < 180; i++) {
                const group = new THREE.Group();
                const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.6, 7), trunkMat);
                trunk.position.y = 3.5;
                group.add(trunk);
                for (let j = 0; j < 12; j++) {
                    const leaf = new THREE.Mesh(new THREE.IcosahedronGeometry(Math.random() * 2 + 2, 0), leafMat);
                    leaf.position.set((Math.random() - 0.5) * 4, 7 + Math.random() * 2, (Math.random() - 0.5) * 4);
                    leaf.castShadow = true;
                    group.add(leaf);
                }
                let x, z;
                do {
                    x = (Math.random() - 0.5) * 2200;
                    z = (Math.random() - 0.5) * 2200;
                } while (Math.sqrt(x * x + z * z) < 250);
                const y = simplex.noise(x / 400, z / 400) * 4;
                group.position.set(x, y, z);
                group.scale.setScalar(1.5 + Math.random() * 2.5);
                landscapeScene.add(group);
            }

            const bushMat = new THREE.MeshStandardMaterial({ color: 0x4a6b36 });
            for (let k = 0; k < 400; k++) {
                const bush = new THREE.Mesh(new THREE.IcosahedronGeometry(Math.random() * 1.5 + 0.8, 0), bushMat);
                let bx, bz;
                do {
                    bx = (Math.random() - 0.5) * 2000;
                    bz = (Math.random() - 0.5) * 2000;
                } while (Math.sqrt(bx * bx + bz * bz) < 200);
                const by = simplex.noise(bx / 400, bz / 400) * 4;
                bush.position.set(bx, by, bz);
                bush.castShadow = true;
                bush.receiveShadow = true;
                landscapeScene.add(bush);
            }
        }

        function createTakientaHouses() {
            const wallMat = new THREE.MeshStandardMaterial({ color: 0x8b6d5c });
            const roofMat = new THREE.MeshStandardMaterial({ color: 0xb49a7a });
            for (let c = 0; c < 8; c++) {
                let clusterX, clusterZ;
                do {
                    clusterX = (Math.random() - 0.5) * 1500;
                    clusterZ = (Math.random() - 0.5) * 1500;
                } while (Math.sqrt(clusterX * clusterX + clusterZ * clusterZ) < 300);
                const group = new THREE.Group();
                for (let i = 0; i < 5; i++) {
                    const house = new THREE.Group();
                    const wall = new THREE.Mesh(new THREE.CylinderGeometry(2, 2.3, 6, 24), wallMat);
                    const roof = new THREE.Mesh(new THREE.ConeGeometry(3.3, 5.5, 24), roofMat);
                    roof.position.y = 5.8;
                    house.add(wall, roof);
                    house.position.set((Math.random() - 0.5) * 40, 2, (Math.random() - 0.5) * 40);
                    house.scale.setScalar(1.5 + Math.random() * 1.5);
                    house.traverse(n => { if (n.isMesh) n.castShadow = true; });
                    group.add(house);
                }
                group.position.set(clusterX, 0, clusterZ);
                landscapeScene.add(group);
            }
        }

        function loadMainModel() {
            const loader = new GLTFLoader();
            const dracoLoader = new DRACOLoader();
            dracoLoader.setDecoderPath('https://unpkg.com/three@0.160.0/examples/jsm/libs/draco/');
            loader.setDRACOLoader(dracoLoader);

            const urls = [
                'La_Takienta.glb',
                'https://raw.githubusercontent.com/fansestar355-star/Toguna-Assets/main/La_Takienta.glb'
            ];

            function tryLoad(index) {
                if (index >= urls.length) {
                    createProceduralTakienta();
                    return;
                }
                loader.load(
                    urls[index],
                    (gltf) => {
                        const model = gltf.scene;
                        model.scale.setScalar(10);
                        const bbox = new THREE.Box3().setFromObject(model);
                        const minY = bbox.min.y;
                        model.position.set(0, -minY, 0);
                        model.traverse(n => { if (n.isMesh) { n.castShadow = true; n.receiveShadow = true; } });
                        landscapeScene.add(model);
                        mainModel = model;

                        setTimeout(() => {
                            addAnnotation("LADDER_2", "Échelle Sacrée");
                            addAnnotation("ALTARS", "Autels Koutammakou");
                            addAnnotation("ATTIC_1", "Grenier Principal");
                            addAnnotation("FORTRESSES", "Murs Défensifs");
                            addAnnotation("THATCHED COVER_1", "Toit en Chaume");
                        }, 500);
                    },
                    null,
                    () => tryLoad(index + 1)
                );
            }
            tryLoad(0);
        }

        function createProceduralTakienta() {
            const takienta = new THREE.Group();
            const earthMat = new THREE.MeshStandardMaterial({ color: 0x8B6D4C, roughness: 1 });
            const earthDarkMat = new THREE.MeshStandardMaterial({ color: 0x6B4F3A, roughness: 1 });
            const thatchMat = new THREE.MeshStandardMaterial({ color: 0xA08050, roughness: 1 });
            const thatchDarkMat = new THREE.MeshStandardMaterial({ color: 0x7A6030, roughness: 1 });
            const doorMat = new THREE.MeshStandardMaterial({ color: 0x3A2A1A, roughness: 1 });

            const mainTower = new THREE.Group();
            const mainBody = new THREE.Mesh(new THREE.CylinderGeometry(4, 4.8, 18, 32), earthMat);
            mainBody.position.y = 9;
            mainTower.add(mainBody);
            const upperFloor = new THREE.Mesh(new THREE.CylinderGeometry(4.5, 4, 2, 32), earthDarkMat);
            upperFloor.position.y = 19;
            mainTower.add(upperFloor);
            const mainRoof = new THREE.Mesh(new THREE.ConeGeometry(6, 8, 32), thatchMat);
            mainRoof.position.y = 24;
            mainRoof.name = "THATCHED COVER_1";
            mainTower.add(mainRoof);
            const door = new THREE.Mesh(new THREE.PlaneGeometry(1.8, 3.5), doorMat);
            door.position.set(0, 2, 4.85);
            mainTower.add(door);
            takienta.add(mainTower);

            const secondaryPositions = [
                { x: 10, z: 0, height: 10, radius: 2.5, name: "ATTIC_1" },
                { x: -10, z: 0, height: 11, radius: 2.3, name: "ATTIC_2" },
                { x: 5, z: 9, height: 9, radius: 2.2, name: "ATTIC_3" },
                { x: -5, z: 9, height: 10, radius: 2.4, name: "ATTIC_4" },
                { x: 5, z: -9, height: 9.5, radius: 2.0, name: "ATTIC_5" },
                { x: -5, z: -9, height: 10.5, radius: 2.1, name: "ATTIC_6" },
            ];

            secondaryPositions.forEach(pos => {
                const tower = new THREE.Group();
                tower.name = pos.name;
                const body = new THREE.Mesh(new THREE.CylinderGeometry(pos.radius, pos.radius * 1.15, pos.height, 24), earthMat);
                body.position.y = pos.height / 2;
                tower.add(body);
                const roof = new THREE.Mesh(new THREE.ConeGeometry(pos.radius + 1.2, 5, 24), thatchMat);
                roof.position.y = pos.height + 2.5;
                tower.add(roof);
                tower.position.set(pos.x, 0, pos.z);
                takienta.add(tower);
            });

            const ladderGroup = new THREE.Group();
            ladderGroup.name = "LADDER_2";
            takienta.add(ladderGroup);

            takienta.scale.setScalar(2.5);
            takienta.traverse(n => { if (n.isMesh) { n.castShadow = true; n.receiveShadow = true; } });
            landscapeScene.add(takienta);
            mainModel = takienta;

            setTimeout(() => {
                addAnnotation("LADDER_2", "Échelle Sacrée");
                addAnnotation("ATTIC_1", "Grenier Principal");
                addAnnotation("THATCHED COVER_1", "Toit en Chaume");
            }, 500);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            if (landscapeRenderer) {
                landscapeCamera.aspect = window.innerWidth / window.innerHeight;
                landscapeCamera.updateProjectionMatrix();
                landscapeRenderer.setSize(window.innerWidth, window.innerHeight);
                labelRenderer.setSize(window.innerWidth, window.innerHeight);
            }
        }

        /**
         * Système d'Annotations Organisées et Interactives
         */
        function addAnnotation(meshName, text) {
            if (!mainModel) return;

            let targetMesh = null;
            mainModel.traverse(child => {
                if (child.name === meshName) targetMesh = child;
            });

            if (targetMesh) {
                // 2. Calcule le point d'ancrage sur le modèle 3D
                const targetPoint = new THREE.Vector3();
                if (meshName === "ALTARS") {
                    // Spécificité : pour les Autels, l'utilisateur a exigé d'utiliser le point d'origine du mesh
                    targetMesh.getWorldPosition(targetPoint);
                } else {
                    // Par défaut, on utilise le centre de la boîte englobante pour un placement harmonieux
                    const bbox = new THREE.Box3().setFromObject(targetMesh);
                    bbox.getCenter(targetPoint);
                }

                // Placement éloigné (style Callout UI)
                const spatialMap = {
                    "LADDER_2": { x: -16, y: 16, z: 8 },
                    "ALTARS": { x: 22, y: 8, z: 16 },
                    "ATTIC_1": { x: -20, y: 22, z: -10 },
                    "ATTIC_2": { x: 20, y: 22, z: -10 },
                    "FORTRESSES": { x: -25, y: 10, z: 16 },
                    "THATCHED COVER_1": { x: 0, y: 30, z: -4 }
                };

                const off = spatialMap[meshName] || { x: 8, y: 12, z: 8 };
                const labelPos = targetPoint.clone().add(new THREE.Vector3(off.x, off.y, off.z));

                // Trait de liaison en blanc solide
                const lineGeo = new THREE.BufferGeometry().setFromPoints([targetPoint, labelPos]);
                const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.8 });
                const line = new THREE.Line(lineGeo, lineMat);
                landscapeScene.add(line);

                // Label Cliquable
                // css2dRoot is the CSS2DObject element — the renderer sets its transform
                // to position it in screen space. The annotation-wrapper is nested inside
                // so its annotationFloat CSS animation never conflicts with the renderer.
                const css2dRoot = document.createElement('div');

                const wrapper = document.createElement('div');
                wrapper.className = 'annotation-wrapper';

                const container = document.createElement('div');
                container.className = 'annotation-container';

                // Alignement dynamique basé sur la position
                if (off.x >= 0) {
                    container.style.transform = 'translateX(50%)';
                    container.style.alignItems = 'flex-start';
                } else {
                    container.style.transform = 'translateX(-50%)';
                    container.style.alignItems = 'flex-end';
                }

                container.onclick = () => showInfo(meshName, targetPoint);

                // Titre
                const title = document.createElement('div');
                title.className = 'annotation-title';
                title.textContent = PART_DESCRIPTIONS[meshName] ? PART_DESCRIPTIONS[meshName].title : text;

                // Ligne de division
                const divider = document.createElement('div');
                divider.className = 'annotation-divider';

                // Sous-titre
                const subtitle = document.createElement('div');
                subtitle.className = 'annotation-subtitle';

                container.appendChild(title);
                container.appendChild(divider);
                container.appendChild(subtitle);
                wrapper.appendChild(container);
                css2dRoot.appendChild(wrapper);

                const label = new CSS2DObject(css2dRoot);
                label.position.copy(labelPos);
                landscapeScene.add(label);

                // Point (Cercle avec point central)
                const dotDiv = document.createElement('div');
                dotDiv.className = 'annotation-point';

                // Stagger animations so each annotation pulses at a different phase
                const staggerDelay = (annotations.length * 0.8) + 's';
                dotDiv.style.animationDelay = staggerDelay;
                wrapper.style.animationDelay = staggerDelay;
                title.style.animationDelay = staggerDelay;

                const dotLabel = new CSS2DObject(dotDiv);
                dotLabel.position.copy(targetPoint);
                landscapeScene.add(dotLabel);

                annotations.push({ label, line, dotLabel });
            }
        }

        /**
         * Affiche le tableau descriptif au bas de la page et zoom la vue sur la portion cliquée.
         */
        function showInfo(partName, point) {
            // Charge les données descriptives associées
            const data = PART_DESCRIPTIONS[partName];
            if (data) {
                document.getElementById('info-title').innerText = data.title;
                document.getElementById('info-text').innerText = data.desc;
            }
            // Déclenche l'apparition visuelle du tableau
            document.getElementById('info-card').classList.add('active');

            // Fait systématiquement disparaitre le bouton "Retour à l'espace" via la classe CSS fade
            document.getElementById('ui-bottom').classList.add('fade');

            // Calcule une position de caméra appropriée décalée par rapport au point cible pour le zoom
            const offset = new THREE.Vector3(20, 15, 20);
            const targetCamPos = point.clone().add(offset);

            // Mouvement fluide de la caméra vers la nouvelle position
            gsap.to(landscapeCamera.position, {
                x: targetCamPos.x,
                y: targetCamPos.y,
                z: targetCamPos.z,
                duration: 1.5,
                ease: "power2.inOut"
            });

            // Mouvement fluide du pivot d'observation (target) directement sur le point visé
            gsap.to(landscapeControls.target, {
                x: point.x,
                y: point.y,
                z: point.z,
                duration: 1.5,
                ease: "power2.inOut",
                onUpdate: () => landscapeControls.update()
            });
        }

        /**
         * Masque le tableau descriptif, recule la vue globale et fait réapparaitre les boutons.
         */
        window.closeInfo = function () {
            // Masque la modale d'information
            document.getElementById('info-card').classList.remove('active');

            // Réaffiche le bouton "Retour à l'espace"
            document.getElementById('ui-bottom').classList.remove('fade');

            // Réinitialise la caméra à une vue globale large pour qu'on voit tout le paysage
            gsap.to(landscapeCamera.position, { x: 100, y: 80, z: 150, duration: 2 });
            gsap.to(landscapeControls.target, { x: 0, y: 0, z: 0, duration: 2 });
        };

        function animate() {
            requestAnimationFrame(animate);
            // Rendre le globe tout au long de la transition
            if (step !== 2 || isTransitioning) {
                if (step !== 2 && controls) controls.update();
                renderer.render(scene, camera);
            }
            if (step === 2 && landscapeRenderer) {
                landscapeControls.update();
                landscapeRenderer.render(landscapeScene, landscapeCamera);
                if (labelRenderer) labelRenderer.render(landscapeScene, landscapeCamera);
            }
        }

        init();
    </script>
